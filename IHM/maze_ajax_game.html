<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Hackathon 2026 — All Games Console</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #080c10;
      --panel: #0d1219;
      --border: #1e2d3d;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --win: #00e676;
      --lose: #ff1744;
      --warn: #ffab00;
      --text: #c8d6e5;
      --muted: #546e7a;
      --cell-wall: #1a2332;
      --cell-fog: #070b0f;
      --cell-floor: #1e3a5f22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      background-image:
              radial-gradient(ellipse at 20% 20%, #00d4ff08 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, #ff6b3508 0%, transparent 50%);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 span { color: var(--accent2); }

    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; max-width: 1100px; margin: 0 auto; }

    /* SIDEBAR */
    .sidebar { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .card-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Game selector */
    .game-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 7px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      transition: all .15s;
      text-align: left;
    }
    .game-btn:hover { background: #1e2d3d44; border-color: var(--border); }
    .game-btn.active { background: #00d4ff12; border-color: var(--accent); color: var(--accent); }
    .game-btn .gid {
      width: 24px; height: 24px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px;
      flex-shrink: 0;
    }

    /* Status */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-box {
      background: #0a1018;
      border-radius: 7px;
      padding: 8px 10px;
    }
    .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 3px; }
    .stat-val { font-size: 14px; font-weight: 700; color: var(--text); }

    /* Controls */
    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 9px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: #0a1018;
      color: var(--text);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      transition: all .15s;
    }
    .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn.primary:hover:not(:disabled) { filter: brightness(1.2); }
    .btn.danger { background: #ff174420; border-color: var(--lose); color: var(--lose); }

    /* Keypad */
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .kbtn {
      padding: 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: #0a1018;
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      transition: all .1s;
      font-family: 'JetBrains Mono', monospace;
    }
    .kbtn:hover:not(:disabled) { background: #1e2d3d; border-color: var(--accent); }
    .kbtn:active:not(:disabled) { transform: scale(.95); }
    .kbtn:disabled { opacity: .3; cursor: not-allowed; }

    /* Log */
    .log {
      background: #0a1018;
      border-radius: 7px;
      padding: 10px;
      height: 120px;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.8;
    }
    .log::-webkit-scrollbar { width: 3px; }
    .log::-webkit-scrollbar-thumb { background: var(--border); }
    .log-line { color: var(--muted); }
    .log-line.ok { color: var(--win); }
    .log-line.err { color: var(--lose); }
    .log-line.info { color: var(--accent); }
    .log-line.warn { color: var(--warn); }

    /* MAIN PANEL */
    .main-panel { display: flex; flex-direction: column; gap: 12px; }

    .screen-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      flex: 1;
    }

    .screen-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 520px;
      background: #000;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    canvas { width: 100%; height: 100%; display: block; }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .li { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
    .lsq { width: 10px; height: 10px; border-radius: 2px; }

    /* Observation display for non-grid games */
    .obs-display {
      width: 100%; height: 100%;
      padding: 16px;
      font-size: 11px;
      color: var(--accent);
      white-space: pre-wrap;
      overflow-y: auto;
      line-height: 1.7;
    }

    /* Auto speed */
    .speed-row { display: flex; align-items: center; gap: 10px; font-size: 11px; }
    .speed-row input { flex: 1; accent-color: var(--accent); }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div style="max-width:1100px;margin:0 auto">
  <h1>◈ Hackathon <span>2026</span> — All Games</h1>

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- Game selector -->
      <div class="card">
        <div class="card-title">Sélection du jeu</div>
        <div id="game-list" style="display:flex;flex-direction:column;gap:4px"></div>
      </div>

      <!-- Session -->
      <div class="card">
        <div class="card-title">Session</div>
        <div class="status-grid">
          <div class="stat-box"><div class="stat-label">ID</div><div class="stat-val" id="s-id">—</div></div>
          <div class="stat-box"><div class="stat-label">Pas</div><div class="stat-val" id="s-steps">—</div></div>
          <div class="stat-box"><div class="stat-label">Statut</div><div class="stat-val" id="s-status">OFFLINE</div></div>
          <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val" id="s-score">—</div></div>
        </div>
      </div>

      <!-- Actions -->
      <div class="card">
        <div class="card-title">Contrôles</div>
        <div class="btn-row" style="margin-bottom:8px">
          <button class="btn primary" id="btn-start" onclick="startGame()">▶ Lancer</button>
          <button class="btn danger" id="btn-stop" onclick="stopGame()" disabled>■ Stop</button>
        </div>
        <div class="btn-row" style="margin-bottom:12px">
          <button class="btn" id="btn-auto" onclick="toggleAuto()" disabled>⚡ Auto-play</button>
        </div>
        <div class="speed-row" style="margin-bottom:12px">
          <span style="color:var(--muted);font-size:10px">Vitesse</span>
          <input type="range" id="speed" min="200" max="2000" step="100" value="1150">
          <span id="speed-val" style="color:var(--accent);min-width:45px">1150ms</span>
        </div>
        <div class="keypad">
          <div></div>
          <button class="kbtn" id="k-up" onclick="act('up')" disabled>↑</button>
          <div></div>
          <button class="kbtn" id="k-left" onclick="act('left')" disabled>←</button>
          <button class="kbtn" id="k-down" onclick="act('down')" disabled>↓</button>
          <button class="kbtn" id="k-right" onclick="act('right')" disabled>→</button>
        </div>
      </div>

      <!-- Log -->
      <div class="card">
        <div class="card-title">Log</div>
        <div class="log" id="log"></div>
      </div>

    </div>

    <!-- MAIN -->
    <div class="main-panel">
      <div class="screen-card">
        <div class="screen-wrap">
          <canvas id="c" width="500" height="500"></canvas>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>

  </div>
</div>

<script>
  const PROXY = 'http://localhost:8765';
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let sessionId = null, autoTimer = null, currentGame = null, memMap = {}, curState = null;

  // ─── JEUX ────────────────────────────────────────────────────────────────────

  const GAMES = [
    { id: 6,  name: 'Brouillard',   icon: '🌫', color: '#00d4ff', type: 'maze' },
    { id: 7,  name: 'Lave',         icon: '🔥', color: '#ff6b35', type: 'maze' },
    { id: 8,  name: 'Clé / Porte',  icon: '🔑', color: '#d29922', type: 'maze' },
    { id: 9,  name: 'Lave + Clé',   icon: '💀', color: '#f85149', type: 'maze' },
    { id: 5,  name: 'Traffic',      icon: '🚗', color: '#00e676', type: 'obs'  },
    { id: 10, name: 'Moon Lander',  icon: '🚀', color: '#c792ea', type: 'obs'  },
    { id: 2,  name: 'Voitures',     icon: '🏎', color: '#ffab00', type: 'obs'  },
  ];

  const CELL_COLORS = {
    '#': '#1a2332', '.': '#0d1f33', '?': '#070b0f',
    'S': '#1f6feb', 'E': '#238636', 'L': '#f85149',
    'K': '#d29922', 'D': '#8b4000', 'P': '#00d4ff',
  };

  const LEGEND_ITEMS = [
    { cell:'player', color:'#00d4ff', label:'Joueur' },
    { cell:'E', color:'#238636', label:'Sortie' },
    { cell:'?', color:'#070b0f', label:'Brouillard' },
    { cell:'#', color:'#1a2332', label:'Mur' },
    { cell:'L', color:'#f85149', label:'Lave' },
    { cell:'K', color:'#d29922', label:'Clé' },
    { cell:'D', color:'#8b4000', label:'Porte' },
    { cell:'S', color:'#1f6feb', label:'Départ' },
  ];

  // ─── INIT ─────────────────────────────────────────────────────────────────────

  function buildGameList() {
    const el = document.getElementById('game-list');
    GAMES.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'game-btn' + (currentGame?.id === g.id ? ' active' : '');
      btn.id = 'gbtn-' + g.id;
      btn.innerHTML = `
      <span class="gid" style="background:${g.color}22;color:${g.color}">${g.id}</span>
      <span>${g.icon} ${g.name}</span>`;
      btn.onclick = () => selectGame(g);
      el.appendChild(btn);
    });
  }

  function buildLegend() {
    const el = document.getElementById('legend');
    el.innerHTML = '';
    LEGEND_ITEMS.forEach(li => {
      el.innerHTML += `<div class="li">
      <div class="lsq" style="background:${li.color};${li.cell==='player'?'border-radius:50%':''}"></div>
      ${li.label}
    </div>`;
    });
  }

  function selectGame(g) {
    currentGame = g;
    document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('gbtn-' + g.id)?.classList.add('active');
    log('Jeu sélectionné : ' + g.icon + ' ' + g.name, 'info');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid(null);
  }

  // ─── API ──────────────────────────────────────────────────────────────────────

  async function api(path, method='POST', body=null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(PROXY + path, opts);
    const text = await r.text();
    let j; try { j = JSON.parse(text); } catch(_) { throw new Error(text); }
    if (!r.ok) { const e = new Error(r.status); e.data = j; throw e; }
    return j;
  }

  // ─── LOG ──────────────────────────────────────────────────────────────────────

  function log(msg, type='') {
    const el = document.getElementById('log');
    const now = new Date().toLocaleTimeString();
    const line = document.createElement('div');
    line.className = 'log-line ' + type;
    line.textContent = now + ' ' + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  // ─── DRAW ─────────────────────────────────────────────────────────────────────

  function drawGrid(s) {
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    if (!s || !s.grid) return;

    const rows = s.grid.length, cols = s.grid[0].length;
    const sz = Math.min(W/cols, H/rows);

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const cell = s.grid[y][x];
        ctx.fillStyle = CELL_COLORS[cell] || '#111';
        ctx.fillRect(x*sz+1, y*sz+1, sz-2, sz-2);

        if (cell && !['?','.',',','#','S'].includes(cell)) {
          ctx.fillStyle = '#ffffffcc';
          ctx.font = `bold ${Math.max(8, sz*.42)}px JetBrains Mono,monospace`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(cell, x*sz+sz/2, y*sz+sz/2);
        }
      }
    }

    if (s.player_pos) {
      const [px, py] = s.player_pos;
      const cx2 = px*sz+sz/2, cy2 = py*sz+sz/2, r = sz*.32;
      ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI*2);
      ctx.fillStyle = currentGame?.color || '#00d4ff'; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    }

    document.getElementById('s-steps').textContent = s.steps ?? s.step ?? 0;
  }

  function drawObs(s) {
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    if (!s) return;

    const obs = s.observation || [];
    const schema = ['altitude','vx','vy','dx_pad','fuel','sin_θ','cos_θ','ω','leg_L','leg_R'];
    const lines = [];

    if (s.lane !== undefined) {
      lines.push('TRAFFIC RACING');
      lines.push('─────────────────');
      lines.push('Lane     : ' + s.lane);
      lines.push('Speed    : ' + (s.speed ?? '—'));
      lines.push('Progress : ' + (s.progress ?? '—') + ' / 130');
      if (s.lane_gaps) {
        Object.entries(s.lane_gaps).forEach(([ln, g]) => {
          lines.push(`Lane ${ln} gaps: ahead=${g.ahead??'∞'} behind=${g.behind??'∞'}`);
        });
      }
    } else if (obs.length > 0) {
      lines.push('OBSERVATION VECTOR');
      lines.push('─────────────────');
      obs.forEach((v, i) => {
        const name = schema[i] || 'obs['+i+']';
        const bar = '█'.repeat(Math.max(0, Math.round((v+1)*8)));
        lines.push(name.padEnd(10) + ' ' + v.toFixed(4) + '  ' + bar);
      });
    } else {
      lines.push(JSON.stringify(s, null, 2));
    }

    ctx.fillStyle = currentGame?.color || '#00d4ff';
    ctx.font = '11px JetBrains Mono,monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    lines.forEach((line, i) => {
      if (i === 0) { ctx.fillStyle = '#fff'; ctx.font = 'bold 13px JetBrains Mono,monospace'; }
      else if (line.startsWith('─')) { ctx.fillStyle = '#1e2d3d'; ctx.font = '11px JetBrains Mono,monospace'; }
      else { ctx.fillStyle = currentGame?.color || '#00d4ff'; ctx.font = '11px JetBrains Mono,monospace'; }
      ctx.fillText(line, 16, 16 + i*18);
    });
  }

  function drawState(s) {
    if (!s) return;
    curState = s;
    if (s.grid) drawGrid(s);
    else drawObs(s);
    document.getElementById('s-steps').textContent = s.steps ?? s.step ?? '—';
  }

  // ─── GAME CONTROL ─────────────────────────────────────────────────────────────

  async function startGame() {
    if (!currentGame) { log('Sélectionne un jeu !', 'err'); return; }
    stopAuto(); memMap = {};
    log('Connexion jeu ' + currentGame.id + '...', 'info');
    try {
      const r = await api('/api/newgame/', 'POST', { idgame: currentGame.id });
      sessionId = r.gamesessionid;
      log('Session ' + sessionId + ' créée', 'ok');
      let s = r.state;
      if (!s) {
        const r2 = await api('/api/get_state/?gamesessionid=' + sessionId, 'GET');
        s = r2.state;
      }
      drawState(s);
      setSessionUI(sessionId, 'RUNNING');
      setControls(true);
    } catch(e) {
      if (e.message === '409' && e.data?.existing_session_id) {
        sessionId = e.data.existing_session_id;
        log('Session existante reprise : ' + sessionId, 'warn');
        setSessionUI(sessionId, 'RESUMED');
        setControls(true);
        try {
          const r2 = await api('/api/get_state/?gamesessionid=' + sessionId, 'GET');
          drawState(r2.state);
        } catch(_) {}
      } else {
        log('Erreur : ' + (e.data?.error || e.message), 'err');
      }
    }
  }

  async function stopGame() {
    stopAuto();
    if (!sessionId) return;
    try {
      await api('/api/stop_game/', 'POST', { gamesessionid: sessionId });
      log('Session ' + sessionId + ' stoppée', 'warn');
    } catch(_) {}
    sessionId = null;
    setSessionUI('—', 'OFFLINE');
    setControls(false);
  }

  async function act(action) {
    if (!sessionId) return;
    try {
      const r = await api('/api/act/', 'POST', { gamesessionid: sessionId, action });
      if (r.state) drawState(r.state);
      if (r.status === 'win') {
        log('VICTOIRE ! +points', 'ok');
        document.getElementById('s-status').textContent = 'WIN';
        document.getElementById('s-score').textContent = '+pts';
        setControls(false); stopAuto(); sessionId = null;
      } else if (r.status === 'lose' || r.status === 'max_steps') {
        log('Défaite (' + r.status + ')', 'err');
        document.getElementById('s-status').textContent = 'LOSE';
        setControls(false); stopAuto(); sessionId = null;
      }
    } catch(e) {
      log('Act error : ' + (e.data?.error || e.message), 'err');
    }
  }

  // ─── AUTO-PLAY (BFS pour les jeux grille) ────────────────────────────────────

  function bfsAction(s) {
    if (!s || !s.grid) {
      const obs_actions = ['accelerate','keep','left','right','brake','idle','main','stabilize'];
      return obs_actions[Math.floor(Math.random()*3)];
    }
    for (let y=0;y<s.grid.length;y++)
      for (let x=0;x<s.grid[y].length;x++) {
        const ch=s.grid[y][x];
        if (ch&&ch!=='?') memMap[x+','+y]=ch;
      }
    const [sx,sy]=s.player_pos, exit=s.exit_pos;
    const has_key = s.has_key ?? false;
    const mv=[['up',0,-1],['down',0,1],['left',-1,0],['right',1,0]];
    const par={[sx+','+sy]:null}, q=[[sx,sy]]; let found=null;

    outer: while(q.length) {
      const [cx,cy]=q.shift();
      for (const [name,dx,dy] of mv) {
        const nx=cx+dx, ny=cy+dy, k=nx+','+ny;
        if (k in par) continue;
        if (exit&&nx===exit[0]&&ny===exit[1]) { par[k]=[cx,cy,name]; found=k; break outer; }
        const ch=memMap[k];
        if (!ch) { par[k]=[cx,cy,name]; found=k; break outer; }
        if (ch==='#'||ch==='L') continue;
        if (ch==='D'&&!has_key) continue;
        par[k]=[cx,cy,name]; q.push([nx,ny]);
      }
    }
    if (!found) return mv[Math.floor(Math.random()*4)][0];
    let cur=found;
    while(par[cur]&&par[par[cur][0]+','+par[cur][1]]!==null)
      cur=par[cur][0]+','+par[cur][1];
    return par[cur]?.[2]??'up';
  }

  function toggleAuto() {
    if (autoTimer) stopAuto();
    else {
      document.getElementById('btn-auto').textContent = '⏸ Stop auto';
      const speed = +document.getElementById('speed').value;
      autoTimer = setInterval(async () => {
        if (!curState || !sessionId) { stopAuto(); return; }
        await act(bfsAction(curState));
      }, speed);
    }
  }
  function stopAuto() {
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    document.getElementById('btn-auto').textContent = '⚡ Auto-play';
  }

  // ─── UI HELPERS ───────────────────────────────────────────────────────────────

  function setControls(on) {
    ['btn-stop','btn-auto','k-up','k-down','k-left','k-right'].forEach(id => {
      document.getElementById(id).disabled = !on;
    });
  }

  function setSessionUI(id, status) {
    document.getElementById('s-id').textContent = id;
    document.getElementById('s-status').textContent = status;
  }

  document.getElementById('speed').addEventListener('input', e => {
    document.getElementById('speed-val').textContent = e.target.value + 'ms';
    if (autoTimer) { stopAuto(); toggleAuto(); }
  });

  document.addEventListener('keydown', e => {
    if (!sessionId) return;
    const m = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right' };
    if (m[e.key]) { e.preventDefault(); act(m[e.key]); }
  });

  // ─── BOOT ─────────────────────────────────────────────────────────────────────

  buildGameList();
  buildLegend();
  selectGame(GAMES[0]);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#1e2d3d';
  ctx.font = 'bold 14px JetBrains Mono,monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Sélectionne un jeu et lance une partie', canvas.width/2, canvas.height/2);
</script>
</body>
</html>
